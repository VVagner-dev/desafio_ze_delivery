services:
  banco-postgis:
    image: postgis/postgis
    container_name: db-ze-delivery
    restart: always
    environment:
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: ze_delivery
      POSTGRES_USER: wagner

    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
